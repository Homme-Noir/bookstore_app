# GitHub Pages + Jekyll (see https://docs.github.com/en/pages/setting-up-a-github-pages-site-with-jekyll/adding-a-theme-to-your-github-pages-site-using-jekyll)
theme: jekyll-theme-minimal
title: Personal Library
description: Reading app — email confirmation landing
show_downloads: false

# Project site: https://<user>.github.io/<repo>/
baseurl: "/bookstore_app"
url: "https://homme-noir.github.io"

# Dev docs in this folder stay in the repo but are not published as site pages.
exclude:
  - README.md
  - architecture.md
  - api_documentation.md
  - developer_guide.md
  - packaging_profile.md
  - production_checklist.md
  - release_and_rollback.md
  - two_device_validation.md
