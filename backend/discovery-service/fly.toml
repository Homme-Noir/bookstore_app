# Deploy from this directory: `fly deploy`
# First time: `fly launch` (creates the Fly app and may merge settings) or set `app` below.
# If the name is taken globally, pick another: `fly apps create <name>`

app = "bookstore-discovery"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
