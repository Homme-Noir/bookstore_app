name: personal_library
description: "Personal library: local reading, discovery, Supabase sync."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.8.2
  provider: ^6.1.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  logger: ^2.0.2+1
  fluttertoast: ^8.2.2
  intl: ^0.20.2
  http: ^1.2.0
  fl_chart: ^0.68.0
  file_picker: ^8.0.7
  path: ^1.9.0
  path_provider: ^2.1.4
  crypto: ^3.0.6
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.25
  flutter_secure_storage: ^9.2.2
  epub_view: ^3.2.0
  pdfx: ^2.6.0
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  flutter_tts: ^4.2.5
  xml: ^6.6.1
  share_plus: ^12.0.2
  archive: ^3.6.1
  html: ^0.15.6
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - images/
